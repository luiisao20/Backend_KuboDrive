spring.application.name=kubodrive

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/kubodrive}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jwt.secret.key=${JWT_SECRET_KEY}

# MinIO
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket-name=${MINIO_BUCKET_NAME:dropbox-clone}

# Multipart upload
minio.multipart.part-size-mb=${MINIO_MULTIPART_PART_SIZE_MB:100}
minio.multipart.presigned-url-expiry-minutes=${MINIO_MULTIPART_PRESIGNED_URL_EXPIRY_MINUTES:30}
